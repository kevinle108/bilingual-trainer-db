<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ language_name }} Learning Chatbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }
        .back-btn {
            display: inline-block;
            padding: 10px 25px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            border-radius: 20px;
            font-weight: bold;
            transition: background 0.2s;
            margin-top: 10px;
        }
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        .chat-container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            height: calc(100vh - 200px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2em;
        }
        .chat-stats {
            background: rgba(102, 126, 234, 0.1);
            padding: 15px 20px;
            display: flex;
            justify-content: space-around;
            border-bottom: 2px solid #f0f0f0;
        }
        .stat {
            text-align: center;
        }
        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
        }
        .stat-label {
            font-size: 0.9em;
            color: #666;
            margin-top: 5px;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        .message {
            margin-bottom: 15px;
            display: flex;
            align-items: flex-start;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .message.bot {
            justify-content: flex-start;
        }
        .message.user {
            justify-content: flex-end;
        }
        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            flex-shrink: 0;
        }
        .message.bot .message-avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin-right: 10px;
        }
        .message.user .message-avatar {
            background: #34d399;
            margin-left: 10px;
            order: 2;
        }
        .message-content {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 18px;
            position: relative;
        }
        .message.bot .message-content {
            background: white;
            border: 2px solid #e5e7eb;
            border-bottom-left-radius: 4px;
        }
        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 12px;
            margin-top: 10px;
            display: block;
            border: 2px solid #f0f0f0;
        }
        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        .quick-reply {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s;
        }
        .quick-reply:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }
        .chat-input-container {
            padding: 20px;
            background: white;
            border-top: 2px solid #f0f0f0;
            display: flex;
            gap: 10px;
        }
        .chat-input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 25px;
            font-size: 1em;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        .chat-input:focus {
            outline: none;
            border-color: #667eea;
        }
        .send-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .send-btn:hover {
            transform: scale(1.05);
        }
        .send-btn:active {
            transform: scale(0.98);
        }
        .typing-indicator {
            display: none;
            padding: 15px 20px;
            background: white;
            border: 2px solid #e5e7eb;
            border-radius: 18px;
            width: fit-content;
        }
        .typing-indicator.active {
            display: block;
        }
        .typing-dots {
            display: flex;
            gap: 4px;
        }
        .typing-dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            animation: bounce 1.4s infinite;
        }
        .typing-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }
        @keyframes bounce {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
        }
        .word-highlight {
            background: linear-gradient(120deg, #fef3c7 0%, #fde68a 100%);
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 {{ language_name }} Learning Chatbot</h1>
        <a href="/flashcards?lang={{ language }}" class="back-btn">← Back to Flashcards</a>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            Your AI Language Learning Companion
        </div>
        
        <div class="chat-stats">
            <div class="stat">
                <div class="stat-value" id="wordsLearned">0</div>
                <div class="stat-label">Words Learned</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="correctAnswers">0</div>
                <div class="stat-label">Correct Answers</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="streak">0</div>
                <div class="stat-label">Current Streak</div>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <!-- Messages will be added here -->
        </div>

        <div class="chat-input-container">
            <input type="text" 
                   id="chatInput" 
                   class="chat-input" 
                   placeholder="Type your answer or message..."
                   autocomplete="off">
            <button class="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const language = '{{ language }}';
        const languageName = '{{ language_name }}';
        let flashcards = {{ flashcards|tojson }};
        let currentCard = null;
        let gameState = {
            wordsLearned: new Set(),
            correctAnswers: 0,
            totalAttempts: 0,
            streak: 0,
            mode: 'quiz' // quiz, practice, chat
        };

        // Initialize chat
        window.addEventListener('DOMContentLoaded', () => {
            addBotMessage("👋 Hello! I'm your " + languageName + " learning assistant. I'm here to help you learn vocabulary through interactive quizzes and conversation!");
            setTimeout(() => {
                showQuickReplies([
                    "Start Quiz",
                    "Practice Mode",
                    "Show My Progress"
                ]);
            }, 1000);

            // Allow Enter key to send message
            document.getElementById('chatInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });
        });

        function addBotMessage(text, imageUrl = null, showReplies = null) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message bot';
            
            let html = `
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    ${text}
                    ${imageUrl ? `<img src="${imageUrl}" class="message-image" alt="flashcard image">` : ''}
                </div>
            `;
            
            messageDiv.innerHTML = html;
            messagesDiv.appendChild(messageDiv);
            
            if (showReplies) {
                setTimeout(() => showQuickReplies(showReplies), 500);
            }
            
            scrollToBottom();
        }

        function addUserMessage(text) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message user';
            
            messageDiv.innerHTML = `
                <div class="message-content">${text}</div>
                <div class="message-avatar">👤</div>
            `;
            
            messagesDiv.appendChild(messageDiv);
            scrollToBottom();
        }

        function showQuickReplies(replies) {
            const messagesDiv = document.getElementById('chatMessages');
            const repliesDiv = document.createElement('div');
            repliesDiv.className = 'message bot';
            
            const buttonsHtml = replies.map(reply => 
                `<button class="quick-reply" onclick="handleQuickReply('${reply}')">${reply}</button>`
            ).join('');
            
            repliesDiv.innerHTML = `
                <div class="message-avatar">💭</div>
                <div class="message-content">
                    <div class="quick-replies">${buttonsHtml}</div>
                </div>
            `;
            
            messagesDiv.appendChild(repliesDiv);
            scrollToBottom();
        }

        function showTyping() {
            const messagesDiv = document.getElementById('chatMessages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot';
            typingDiv.id = 'typingIndicator';
            
            typingDiv.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="typing-indicator active">
                    <div class="typing-dots">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            `;
            
            messagesDiv.appendChild(typingDiv);
            scrollToBottom();
        }

        function removeTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        function scrollToBottom() {
            const messagesDiv = document.getElementById('chatMessages');
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            addUserMessage(message);
            input.value = '';
            
            // Process the message
            setTimeout(() => {
                processUserMessage(message);
            }, 500);
        }

        function handleQuickReply(reply) {
            // Remove all quick reply buttons
            document.querySelectorAll('.quick-reply').forEach(btn => {
                btn.disabled = true;
                btn.style.opacity = '0.5';
            });
            
            addUserMessage(reply);
            
            setTimeout(() => {
                processUserMessage(reply);
            }, 500);
        }

        function processUserMessage(message) {
            showTyping();
            
            setTimeout(() => {
                removeTyping();
                
                const lowerMsg = message.toLowerCase();
                
                // Check if answering a quiz question
                if (currentCard) {
                    checkAnswer(message);
                }
                // Next question / Continue learning
                else if (lowerMsg.includes('next') || lowerMsg.includes('continue') || lowerMsg.includes('fresh')) {
                    askQuestion();
                }
                // Start quiz
                else if (lowerMsg.includes('quiz') || lowerMsg.includes('start')) {
                    startQuiz();
                }
                // Practice mode
                else if (lowerMsg.includes('practice')) {
                    startPractice();
                }
                // Show progress
                else if (lowerMsg.includes('progress') || lowerMsg.includes('stats')) {
                    showProgress();
                }
                // Take a break
                else if (lowerMsg.includes('break')) {
                    addBotMessage("Take your time! I'll be here when you're ready to continue. Just say 'start' when you want to practice more! 😊");
                }
                // Help
                else if (lowerMsg.includes('help')) {
                    showHelp();
                }
                // Default response
                else {
                    addBotMessage("I can help you learn " + languageName + " vocabulary! Would you like to:");
                    showQuickReplies(["Start Quiz", "Practice Mode", "Show My Progress"]);
                }
            }, 1000);
        }

        function startQuiz() {
            gameState.mode = 'quiz';
            addBotMessage("🎯 Great! Let's start the quiz. I'll show you a " + languageName + " word and image, and you tell me the English translation!");
            setTimeout(() => {
                askQuestion();
            }, 1000);
        }

        function startPractice() {
            gameState.mode = 'practice';
            addBotMessage("📚 Practice mode activated! I'll quiz you, but I'll give you hints if you need help.");
            setTimeout(() => {
                askQuestion();
            }, 1000);
        }

        function askQuestion() {
            // Get a random flashcard
            currentCard = flashcards[Math.floor(Math.random() * flashcards.length)];
            
            const imageUrl = `/images/${currentCard.image_file}`;
            const question = `What is the English word for <span class="word-highlight">${currentCard.translated_word}</span>?`;
            
            addBotMessage(question, imageUrl);
        }

        function checkAnswer(answer) {
            const correct = currentCard.english_word.toLowerCase();
            const userAnswer = answer.toLowerCase().trim();
            
            gameState.totalAttempts++;
            
            if (userAnswer === correct) {
                // Correct answer!
                gameState.correctAnswers++;
                gameState.streak++;
                gameState.wordsLearned.add(currentCard.english_word);
                updateStats();
                
                const encouragements = [
                    "🎉 Excellent! That's correct!",
                    "✨ Perfect! You got it!",
                    "🌟 Amazing! Well done!",
                    "🎊 Fantastic! You're doing great!",
                    "👏 Brilliant! Keep it up!"
                ];
                const msg = encouragements[Math.floor(Math.random() * encouragements.length)];
                
                addBotMessage(msg + ` <span class="word-highlight">${currentCard.translated_word}</span> = <span class="word-highlight">${currentCard.english_word}</span>`);
                
                currentCard = null;
                
                setTimeout(() => {
                    showQuickReplies(["Next Question", "Take a Break", "Show Progress"]);
                }, 1000);
            }
            else {
                // Wrong answer
                gameState.streak = 0;
                updateStats();
                
                if (gameState.mode === 'practice') {
                    // Give a hint in practice mode
                    const hint = currentCard.english_word.substring(0, 2) + "...";
                    addBotMessage(`Not quite! Here's a hint: it starts with <span class="word-highlight">${hint}</span> Try again!`);
                }
                else {
                    addBotMessage(`Not quite! The correct answer is <span class="word-highlight">${currentCard.english_word}</span>. Let's try another one!`);
                    currentCard = null;
                    
                    setTimeout(() => {
                        showQuickReplies(["Next Question", "Switch to Practice Mode", "Take a Break"]);
                    }, 1000);
                }
            }
        }

        function showProgress() {
            const accuracy = gameState.totalAttempts > 0 
                ? Math.round((gameState.correctAnswers / gameState.totalAttempts) * 100) 
                : 0;
            
            addBotMessage(`📊 Your Progress:<br>
                • Words learned: ${gameState.wordsLearned.size} / ${flashcards.length}<br>
                • Correct answers: ${gameState.correctAnswers}<br>
                • Accuracy: ${accuracy}%<br>
                • Current streak: ${gameState.streak}<br><br>
                Keep up the great work! 🌟`);
            
            setTimeout(() => {
                showQuickReplies(["Continue Learning", "Start Fresh Quiz"]);
            }, 1000);
        }

        function showHelp() {
            addBotMessage(`I can help you learn ${languageName} in several ways:<br><br>
                🎯 <strong>Quiz Mode:</strong> Test your knowledge<br>
                📚 <strong>Practice Mode:</strong> Learn with hints<br>
                📊 <strong>Progress:</strong> See your stats<br><br>
                Just tell me what you'd like to do!`);
            
            showQuickReplies(["Start Quiz", "Practice Mode", "Show My Progress"]);
        }

        function updateStats() {
            document.getElementById('wordsLearned').textContent = gameState.wordsLearned.size;
            document.getElementById('correctAnswers').textContent = gameState.correctAnswers;
            document.getElementById('streak').textContent = gameState.streak;
        }
    </script>
</body>
</html>
