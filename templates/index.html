<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilingual Trainer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); */
            background: #314186;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 60px 40px;
            padding-top: 40px;
            padding-bottom: 16px;

            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 15px;
        }
        .subtitle {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 40px;
        }
        .language-grid {
            display: grid;
            gap: 20px;
            margin-top: 30px;
        }
        .language-btn {
            display: block;
            padding: 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 15px;
            font-size: 1.3em;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .language-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.5);
        }
        .flag {
            font-size: 2em;
            margin-right: 10px;
        }
        .language-selector {
            margin: 30px 0;
        }
        .language-selector-label {
            color: #667eea;
            font-size: 1.3em;
            font-weight: 600;
            margin-bottom: 15px;
            display: block;
        }
        .lang-toggle-group {
            display: inline-flex;
            gap: 0;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }
        .lang-toggle-btn {
            padding: 15px 30px;
            background: #f5f5f5;
            color: #667eea;
            border: none;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: 600;
            transition: all 0.2s;
            border-right: 2px solid rgba(102, 126, 234, 0.2);
        }
        .lang-toggle-btn:last-child {
            border-right: none;
        }
        .lang-toggle-btn:hover {
            background: #e5e5e5;
        }
        .lang-toggle-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: bold;
        }
        .mode-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
        }
        .divider {
            margin: 40px 0 30px 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(102, 126, 234, 0.3) 20%, rgba(102, 126, 234, 0.3) 80%, transparent);
            position: relative;
        }
        .divider::after {
            /* content: '✨'; */
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 0 15px;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎴 Bilingual Trainer</h1>
        <!-- <p class="subtitle">Choose a language and learning mode</p> -->
        
        <!-- Language Selector -->
        <div class="language-selector">
            <!-- <label class="language-selector-label">Select Language:</label> -->
            <p class="subtitle">Choose a language and learning mode:</p>
            <div class="lang-toggle-group">
                <button class="lang-toggle-btn" onclick="selectLanguage('es')" data-lang="es">
                    🇪🇸 Spanish
                </button>
                <button class="lang-toggle-btn active" onclick="selectLanguage('vi')" data-lang="vi">
                    🇻🇳 Vietnamese
                </button>
                <button class="lang-toggle-btn" onclick="selectLanguage('fr')" data-lang="fr">
                    🇫🇷 French
                </button>
                
            </div>
        </div>
        
        <!-- Mode Buttons -->
        <div class="mode-buttons">
            <a href="/flashcards?lang=vi" class="language-btn" id="flashcardsBtn">
                🎴 Flashcards
            </a>
            <a href="/chatbot?lang=vi" class="language-btn" id="chatbotBtn" style="background: linear-gradient(135deg, #34d399 0%, #059669 100%); box-shadow: 0 5px 15px rgba(52, 211, 153, 0.4);">
                🤖 AI Chatbot
            </a>
        </div>

        <!-- Visual Separator -->
        <div class="divider"></div>

        <!-- AI Generator Button -->
        <p class="subtitle">Or generate custom flashcards with AI!</p> 
        <div style="margin: 30px 0; text-align: center;">
            <a href="/generator" class="language-btn" style="display: inline-block; width: auto;">
                ✨ AI Flashcard Generator
            </a>
        </div>
    </div>
    
    <script>
        let selectedLanguage = 'vi'; // Default to Vietnamese
        
        // Load saved language preference from localStorage
        window.addEventListener('DOMContentLoaded', () => {
            const savedLang = localStorage.getItem('selectedLanguage');
            if (savedLang) {
                selectLanguage(savedLang);
            }
        });
        
        function selectLanguage(langCode) {
            selectedLanguage = langCode;
            
            // Update active state on buttons
            const buttons = document.querySelectorAll('.lang-toggle-btn');
            buttons.forEach(btn => {
                if (btn.dataset.lang === langCode) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            
            // Update links
            document.getElementById('flashcardsBtn').href = `/flashcards?lang=${langCode}`;
            document.getElementById('chatbotBtn').href = `/chatbot?lang=${langCode}`;
            
            // Save preference to localStorage
            localStorage.setItem('selectedLanguage', langCode);
        }
    </script>
</body>
</html>
